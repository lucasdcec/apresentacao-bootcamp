<!doctype html>

<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>First Step - Pitch Presentation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&amp;family=Open+Sans:wght@400;600&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Open Sans", sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f0fdf4; /* Light green/blue tint background */
      }
      .slide-container {
        width: 1280px;
        height: 720px;
        display: flex;
        overflow: hidden;
        background-color: #ffffff;
        position: relative;
      }
      .font-heading {
        font-family: "Montserrat", sans-serif;
      }
      .blob {
        position: absolute;
        filter: blur(40px);
        z-index: 0;
        opacity: 0.4;
      }
    </style>
  </head>
  <body>
    <div class="slide-container">
      <!-- Background Elements -->
      <div
        class="blob bg-blue-200 w-96 h-96 rounded-full top-0 left-0 -translate-x-1/2 -translate-y-1/2"
      ></div>
      <div
        class="blob bg-green-200 w-96 h-96 rounded-full bottom-0 right-1/3 translate-y-1/2"
      ></div>
      <!-- Left Content -->
      <div class="w-1/2 flex flex-col justify-center px-20 z-10 relative">
        <div class="mb-8">
          <div
            class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-teal-600 text-white mb-6 shadow-lg"
          >
            <img src="../public/logo.jpg" alt="logoProjeto" />
          </div>
          <p
            class="text-teal-600 font-bold tracking-widest text-sm uppercase mb-2"
          >
            University Innovation Bootcamp
          </p>
          <h1
            class="font-heading text-7xl font-extrabold text-slate-800 leading-tight mb-4"
          >
            First Step
          </h1>
          <h2
            class="font-heading text-3xl text-slate-600 font-light leading-snug"
          >
            AI Learning Companion<br />
            <span class="font-semibold text-teal-600">for Children</span>
          </h2>
        </div>
        <div class="w-24 h-2 bg-teal-500 rounded-full mb-8"></div>
        <div class="flex flex-col gap-2">
          <p class="text-xl text-slate-700 font-medium flex items-center gap-3">
            <i class="fa-solid fa-check text-teal-500"></i> Curiosidade
          </p>
          <p class="text-xl text-slate-700 font-medium flex items-center gap-3">
            <i class="fa-solid fa-check text-teal-500"></i> Aprendizado
          </p>
          <p class="text-xl text-slate-700 font-medium flex items-center gap-3">
            <i class="fa-solid fa-check text-teal-500"></i> Segurança
          </p>
        </div>
        <div class="mt-16 text-slate-400 text-sm">
          <p>Apresentado por: <strong>Equipe Inovação</strong></p>
          <p>Março 2026</p>
        </div>
      </div>
      <!-- Right Visual -->
      <div class="w-1/2 h-full relative z-10">
        <div
          class="absolute inset-0 bg-slate-100 flex items-center justify-center overflow-hidden"
        >
          <!-- Using a high quality image representing child interaction/learning -->
          <img
            alt="Child learning with technology"
            class="w-full h-full object-cover opacity-90"
            src="https://page.gensparksite.com/slides_images/7d849c54cf3d51ae0398b584902f017c.webp"
          />
          <!-- Overlay Gradient -->
          <div
            class="absolute inset-0 bg-gradient-to-r from-white via-transparent to-transparent"
          ></div>
          <!-- Floating Card Detail -->
          <div
            class="absolute bottom-12 right-12 bg-white/90 backdrop-blur-sm p-6 rounded-2xl shadow-xl max-w-xs border-l-4 border-teal-500"
          >
            <div class="flex items-center gap-4 mb-2">
              <div
                class="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center text-blue-600"
              >
                <i class="fa-solid fa-robot"></i>
              </div>
              <div>
                <p class="text-xs text-slate-500 uppercase font-bold">Status</p>
                <p class="text-slate-800 font-bold">Monitoramento Ativo</p>
              </div>
            </div>
            <p class="text-sm text-slate-600 leading-relaxed">
              Transformando o tempo de tela em tempo de qualidade.
            </p>
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
